[package]
name = "ball_watcher"
version = "0.1.0"
edition = "2024"

[dependencies]
nalgebra = { version = "0.34.2" }
tracktor = "0.4.1"

prost = "0.14.3"
prost-types = { version = "0.14.3", features = ["chrono"] }

tokio = { version = "1.52.3", features = [
    "net",
    "rt-multi-thread",
    "macros",
    "sync",
    "io-util",
    "time",
] }
tracing = "0.1.44"
tracing-subscriber = "0.3.23"

anyhow = "1.0"
thiserror = "2.0.18"
approx = "0.5.1"
bytes = "1.11.1"
chrono = "0.4.44"
rand = "0.10.1"
parking_lot = "0.12.5"

[build-dependencies]
prost-build = "0.14.3"
