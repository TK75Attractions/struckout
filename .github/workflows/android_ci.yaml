name: Android CI

on:
  push: 
    branches: main
    paths: 
      - struckoutCameraApp/**
  pull_request:
    branches: main
    paths:
      - struckoutCameraApp/**
  workflow_dispatch: 

jobs:
  android_ci:
    name: Android CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: struckoutCameraApp/
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
      - name: Install OpenCV
        run: |
          cd ../
          chmod +x ./install-opencv.sh
          ./install-opencv.sh
      - name: check
        run: ./gradlew :app:check
