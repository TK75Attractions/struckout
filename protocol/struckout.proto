syntax = "proto3";

package struckout.v1;

// UDPでカメラからサーバに送られるパケット
message UdpPacket {
  uint32 camera_id = 1;
  // UNIX epochからの経過時間
  int64 timestamp = 2;
  uint64 frame_id = 3;
  repeated DetectedObject detected_objects = 4;
}

message DetectedObject {
  int32 bbox_width = 1;
  int32 bbox_height = 2;
  double lay_x = 3;
  double lay_y = 4;
  double lay_z = 5;
  // TODO: 特徴量
}

// TCPでカメラからサーバに送られるパケット
message TcpClientPacket {
  message UpdateCameraLocation {
    uint32 camera_id = 1;
    CameraLocation camera_location = 2;
  }

  oneof data {
    UpdateCameraLocation camera_loc = 1;
  }
}

message CameraLocation {
  float x = 1;
  float y = 2;
  float z = 3;
}

// TCPでサーバーからカメラに送られるパケット
message TcpServerPacket {
  oneof data {
    // assign a camera id to client.
    uint32 camera_id = 1;
  }
}
