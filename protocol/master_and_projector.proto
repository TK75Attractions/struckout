syntax = "proto3";

package tk75attractions.struckout.v1;

enum Difficulty {
  DIFFICULTY_UNSPECIFIED = 0;
  DIFFICULTY_NORMAL = 1;
  DIFFICULTY_HARD = 2;
  DIFFICULTY_VERYHARD = 3;
}

message StartGameRequest {
  Difficulty difficulty = 1;
}

message StartGameResponse {}

message MasterPacket {
  oneof payload {
    StartGameRequest request = 1;
  }
}

service MasterToProjectorService {
  rpc StartGame(StartGameRequest) returns (StartGameResponse);
}
