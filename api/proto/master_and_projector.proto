syntax = "proto3";

package tk75attractions.struckout.v1;

enum Difficulty {
  DIFFICULTY_UNSPECIFIED = 0;
  DIFFICULTY_NORMAL = 1;
  DIFFICULTY_HARD = 2;
  DIFFICULTY_VERYHARD = 3;
}

message StartGame {
  Difficulty difficulty = 1;
}

// game-masterからprojectorに送られるパケット
message MasterProjectorPacket {
  oneof payload {
    StartGame start_game = 1;
  }
}

// projectorからgame-masterに送られるパケット
message ProjectorMasterPacket {
  oneof payload {
    uint32 score = 1;
  }
}
