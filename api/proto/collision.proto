syntax = "proto3";

package tk75attractions.struckout.v1;

message CollisionPoint {
  double x = 1;
  double y = 2;
}

message TestMessage {
  string message = 1;
}

// packet sent from `ball-tracker` to `projector`
message ProjectorPacket {
  oneof payload {
    CollisionPoint point = 1;
    TestMessage message = 2;
  }
}
